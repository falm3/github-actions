name: Continuous Deployment workflow

on:
  push:
    branches:
      - master

jobs:
  cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install
        run: npm i
      - name: Build
        run: npm run build
      - name: Deploy
        run: npm run deploy -- -r git@github.com:falm3/github-actions.git
